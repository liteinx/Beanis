<body>
    <div class="container">
        <header class="page-header">
            <a href="../index.html" class="back-link">← Back to Store</a>
            <div class="client-header-content">
                <div class="app-icon-large">
                    <img src='/home/scatiux/untitled folder/apple-touch-icon.png' alt=LeakVids>
                    '/home/scatiux/untitled folder/apple-touch-icon.png'

                <h1>LeakVids</h1>
                <p class=header-description>Enjoy Best Leaked and stolen XXX vidoes for free.</p>

        <main class="downloads-section">
            <h2>Your Downloads</h2>
            <div class="downloads-list" id="downloads-list"></div>
        </main>
    </div>

    <script>
        const apks = ;
        const downloadsList = document.getElementById('downloads-list');

        apks.forEach(apk => {
            const fileSize = apk.file_size < 1048576
                ? Math.round(apk.file_size / 1024) + 'KB'
                : Math.round(apk.file_size / 1048576) + 'MB';

            const uploadDate = new Date(apk.upload_date).toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });

            const item = document.createElement('div');
            item.className = 'download-item';
            item.innerHTML = `
                <div class="download-info">
                    <div class="download-version">Version ${apk.version}</div>
                    <div class="download-meta">Build ${apk.build_number} • ${fileSize} • ${uploadDate}</div>
                    ${apk.notes ? `<div class="download-notes">${apk.notes}</div>` : ''}
                </div>
                <a href="../apks/${apk.filename}" class="btn-download" download>
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    Download
                </a>
            `;
            downloadsList.appendChild(item);
        });
    </script>
